name: Update Kodi Repository

on:
  schedule:
    - cron: "0 */1 * * *" # Every 1 hour
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-repository:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install gitpython

      - name: Run create_repository.py
        run: |
          python scripts/create_repository.py \
            --datadir=files \
            https://github.com/fentastic-org/script.fentastic.helper \
            https://github.com/fentastic-org/skin.fentastic

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add files/
          git commit -m "Update repository add-ons"
          git push
